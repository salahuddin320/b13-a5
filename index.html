<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and fev icon -->
    <title>Github-Issue-Tracker</title>
    <link rel="shortcut icon" href="./assets/Aperture.png" type="image/x-icon">

    <!-- font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style css -->
    <link rel="stylesheet" href="./style/style.css">
</head>

<body class="bg-[#F8FAFC]"> 
    <!-- banner section -->
    <section class="flex flex-col-reverse md:flex-row items-center justify-between gap-10">
        <div class="content space-y-6 flex flex-col mx-auto lg:w-4/12 w-8/12 bg-white p-8 my-5 shadow-md rounded-sm">
            <img class="w-3/12 mx-auto" src="./assets/github-logo.png" alt="">
            <div class="text-center">
                <h2 class="text-2xl font-semibold mb-2 text-[#1F2937]">GitHub Issues Tracker</h2>
                <p class="font-bangla">Sign in to manage your issues </p>
            </div>

            <fieldset class="fieldset">
                <legend class="fieldset-legend">Username</legend>
                <input id="username" type="text" class="input w-full" placeholder="Enter Username" />
                <p class="text-sm text-[#4A00FF]">Default: admin</p>
                <legend class="fieldset-legend">Password</legend>
                <input id="password" type="password" class="input w-full" placeholder="Password" />
                <p class="text-sm text-[#4A00FF]">Default: admin123</p>
            </fieldset>
            <button onclick="loginPage()" class="btn btn-primary font-semibold text-sm rounded-md">Sign In</button>
            <div id="content-container"></div>
        </div>
    </section>
    <script src="./js/index.js"></script>
</body>

</html>
